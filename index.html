<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>iCONSTANTINE</title>
<meta name="description" content="Championship Media — Cinema-grade video and photography for massage championships worldwide.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#fff}

/* ── CANVAS LAYERS ── */
#grain-cvs{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:.042;
  width:100%;height:100%}
#iris-cvs{position:fixed;inset:0;z-index:40;pointer-events:none}

/* ── ATMOSPHERE ── */
.bg-deep{position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse 60% 50% at 50% 42%,rgba(160,120,8,.055) 0%,transparent 68%)}
.vignette{position:fixed;inset:0;z-index:6;pointer-events:none;
  background:radial-gradient(ellipse 90% 85% at 50% 50%,transparent 48%,rgba(0,0,0,.88) 100%)}
.light-leak{position:fixed;top:0;left:-5%;right:-5%;height:30%;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 75% 55% at 50% 0%,rgba(200,150,15,.05) 0%,transparent 70%);
  animation:leakPulse 9s ease-in-out infinite}
@keyframes leakPulse{0%,100%{opacity:.55}50%{opacity:1}}

/* ── LENS FLARE (at iris open moment) ── */
.flare{position:fixed;inset:0;z-index:38;pointer-events:none;
  background:radial-gradient(ellipse 28% 22% at 50% 50%,rgba(255,235,170,.82) 0%,rgba(212,175,55,.28) 28%,transparent 62%);
  opacity:0;animation:flareBurst 1s ease .28s forwards}
@keyframes flareBurst{0%{opacity:0}7%{opacity:1}100%{opacity:0}}

/* ── MAIN STAGE ── */
.stage{position:relative;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:100vh;
  padding:40px 20px 55px;gap:0}

/* ── EYE LOGO ── */
.eye-logo{width:108px;height:108px;object-fit:contain;margin-bottom:22px;
  animation:eyeReveal 1s cubic-bezier(.2,.8,.3,1) 1.38s both;
  will-change:transform,filter}
@keyframes eyeReveal{
  0%{opacity:0;transform:scale(.72);filter:brightness(3.5) blur(6px) saturate(2)}
  55%{filter:brightness(1.4) blur(0) saturate(1.2)}
  100%{opacity:1;transform:scale(1);filter:brightness(1) blur(0) saturate(1)}}
.eye-logo.breathe{
  opacity:1;
  animation:eyeFloat 7s ease-in-out infinite, eyeBreath 4.5s ease-in-out infinite;
  filter:drop-shadow(0 0 14px rgba(212,175,55,.62)) drop-shadow(0 0 42px rgba(212,175,55,.26))}
@keyframes eyeFloat{
  0%{transform:translateY(0px) rotate(0deg) scale(1)}
  25%{transform:translateY(-7px) rotate(0.5deg) scale(1.015)}
  55%{transform:translateY(-4px) rotate(-0.4deg) scale(1.008)}
  80%{transform:translateY(-9px) rotate(0.3deg) scale(1.012)}
  100%{transform:translateY(0px) rotate(0deg) scale(1)}}
@keyframes eyeBreath{
  0%,100%{filter:drop-shadow(0 0 13px rgba(212,175,55,.58)) drop-shadow(0 0 38px rgba(212,175,55,.22))}
  50%{filter:drop-shadow(0 0 22px rgba(212,175,55,.92)) drop-shadow(0 0 58px rgba(212,175,55,.42))}}

/* ── BRAND NAME ── */
.brand{display:flex;margin-bottom:17px}
.brand span{font-size:12px;font-weight:500;letter-spacing:.44em;text-transform:uppercase;
  color:rgba(212,175,55,.9);opacity:0;animation:lttrUp .32s ease forwards}
.brand span:nth-child(1){animation-delay:1.6s}
.brand span:nth-child(2){animation-delay:1.66s}
.brand span:nth-child(3){animation-delay:1.72s}
.brand span:nth-child(4){animation-delay:1.78s}
.brand span:nth-child(5){animation-delay:1.84s}
.brand span:nth-child(6){animation-delay:1.90s}
.brand span:nth-child(7){animation-delay:1.96s}
.brand span:nth-child(8){animation-delay:2.02s}
.brand span:nth-child(9){animation-delay:2.08s}
.brand span:nth-child(10){animation-delay:2.14s}
.brand span:nth-child(11){animation-delay:2.20s}
.brand span:nth-child(12){animation-delay:2.26s}
@keyframes lttrUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ── DIVIDER ── */
.div-line{height:1px;width:0;margin:0 0 15px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.42),transparent);
  animation:lineGrow .85s ease 2.45s forwards}
@keyframes lineGrow{to{width:210px}}

/* ── CHOOSE TITLE ── */
.choose{font-size:9.5px;letter-spacing:.32em;text-transform:uppercase;
  color:rgba(255,255,255,.28);margin-bottom:21px;
  opacity:0;animation:upFade .55s ease 2.62s forwards}

/* ── LANG GRID ── */
.lang-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;
  max-width:600px;width:94vw;
  opacity:0;transform:translateY(14px);animation:upFade .7s ease 2.82s forwards}
@keyframes upFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.lb{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:9px 5px 8px;background:rgba(255,255,255,.022);
  border:1px solid rgba(212,175,55,.09);border-radius:9px;
  cursor:pointer;text-decoration:none;color:rgba(255,255,255,.56);
  transition:background .18s,border-color .22s,color .18s,transform .14s,box-shadow .18s;
  text-align:center;line-height:1.3;-webkit-tap-highlight-color:transparent}
.lb:hover{background:rgba(212,175,55,.1);border-color:rgba(212,175,55,.36);
  color:rgba(255,255,255,.93);transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(212,175,55,.11)}
.lb:active{transform:translateY(-1px)}
.lb .f{font-size:19px;line-height:1}
.lb .n{font-size:9.5px;letter-spacing:.025em}
.lb.en{border-color:rgba(212,175,55,.19);color:rgba(212,175,55,.78)}
.lb.hi{
  border-color:rgba(212,175,55,.42)!important;
  background:rgba(212,175,55,.1)!important;
  color:rgba(255,255,255,.92)!important;
  animation:langPulse 2.2s ease-in-out infinite}
@keyframes langPulse{
  0%,100%{
    border-color:rgba(212,175,55,.22);
    background:rgba(212,175,55,.04);
    box-shadow:none;
    color:rgba(255,255,255,.6);
    transform:scale(1)}
  50%{
    border-color:rgba(212,175,55,.72);
    background:rgba(212,175,55,.17);
    box-shadow:0 0 22px rgba(212,175,55,.22),0 0 8px rgba(212,175,55,.14),inset 0 0 10px rgba(212,175,55,.06);
    color:rgba(255,255,255,1);
    transform:scale(1.04)}}

/* ── AUTO BAR ── */
.auto-bar{position:fixed;bottom:24px;left:0;right:0;
  text-align:center;opacity:0;animation:upFade .6s ease 3.35s forwards;
  padding:0 16px;box-sizing:border-box;pointer-events:none}
.auto-msg{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.07em;margin-bottom:7px}
.auto-msg b{color:rgba(212,175,55,.55);font-weight:400}
.prog-track{width:min(230px,calc(100vw - 80px));height:1.5px;background:rgba(255,255,255,.05);border-radius:2px;margin:0 auto;overflow:hidden}
.prog-fill{height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,rgba(212,175,55,.38),rgba(212,175,55,.82));
  transition:width .08s linear}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .lang-grid{grid-template-columns:repeat(4,1fr)}
  .eye-logo{width:90px;height:90px}
}
@media(max-width:360px){
  .lang-grid{grid-template-columns:repeat(3,1fr)}
}

/* ── TOUCH FIX: prevents iOS double-tap-to-click on hover elements ── */
.btn-book, .btn-details, .btn-addon, .modal-btn-agree, .modal-btn-back, .modal-btn-upgrade, .pkg-card, .nav-dot, .btn-details { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
</style>

<script>
// ═══════════════════════════════════════════════════════
// FILM GRAIN — small canvas scaled up for performance
// ═══════════════════════════════════════════════════════
(function(){
  var c = document.getElementById('grain-cvs');
  var ctx = c.getContext('2d');
  var scale = 3; // upscale factor (less pixels to fill = faster)
  var W, H;
  function resize(){
    W = c.width = Math.ceil(window.innerWidth / scale);
    H = c.height = Math.ceil(window.innerHeight / scale);
    c.style.width = window.innerWidth + 'px';
    c.style.height = window.innerHeight + 'px';
    c.style.imageRendering = 'pixelated';
  }
  resize();
  window.addEventListener('resize', resize);
  var frame = 0;
  function tick(){
    frame++;
    // Update grain every other frame to ease CPU
    if (frame % 2 === 0){
      var id = ctx.createImageData(W, H);
      var d = id.data;
      for (var i = 0; i < d.length; i += 4){
        var v = (Math.random() * 255) | 0;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = v > 140 ? ((Math.random() * 28)|0) : 0;
      }
      ctx.putImageData(id, 0, 0);
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

// ═══════════════════════════════════════════════════════
// CAMERA APERTURE IRIS ANIMATION
// ═══════════════════════════════════════════════════════
(function(){
  var c = document.getElementById('iris-cvs');
  var ctx = c.getContext('2d');
  var W, H;
  function resize(){
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var N = 7;           // aperture blades
  var START = 260;     // ms before iris begins opening
  var DUR = 1900;      // ms for iris to fully open
  var FADE_AT = 2300;  // ms when canvas starts fading
  var FADE_DUR = 480;  // ms to fully fade canvas

  var t0 = null;
  var done = false;

  function ease(t){
    // Smooth ease-in-out with slight overshoot feel
    return t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  }

  function draw(ts){
    if(done) return;
    if(!t0) t0 = ts;
    var elapsed = ts - t0;

    // Iris open progress 0→1
    var raw = Math.max(0, Math.min(1, (elapsed - START) / DUR));
    var p = ease(raw);

    // Canvas fade-out
    var canvasAlpha = 1;
    if(elapsed > FADE_AT){
      canvasAlpha = Math.max(0, 1 - (elapsed - FADE_AT) / FADE_DUR);
    }
    if(canvasAlpha <= 0){
      c.style.opacity = '0';
      c.style.pointerEvents = 'none';
      done = true;
      // Switch eye to breathing glow
      var eye = document.getElementById('eyeLogo');
      if(eye) eye.classList.add('breathe');
      return;
    }
    c.style.opacity = canvasAlpha;

    var cx = W/2, cy = H/2;
    var maxR = Math.hypot(W, H) * 0.56;

    ctx.clearRect(0, 0, W, H);

    // Full black background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if(p > 0){
      // ── Cut iris opening using destination-out ──
      // The polygon rotates and grows — authentic aperture behavior
      var openR = p * maxR;
      // Rotation increases as it opens, like real iris blades pivoting
      var rot = p * (Math.PI / N) * 1.15;

      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();

      // N-sided polygon with sinusoidal edge modulation
      // creates the characteristic multi-blade scalloped shape
      var steps = N * 12; // smooth polygon
      for(var i = 0; i <= steps; i++){
        var a = (i / steps) * Math.PI * 2 + rot;
        // Modulate radius: creates slight concavity at each blade junction
        var mod = 0.83 + 0.17 * Math.cos(N * a - N * rot + Math.PI / N);
        var r = openR * mod;
        var x = cx + r * Math.cos(a);
        var y = cy + r * Math.sin(a);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fill();
      ctx.restore();

      // ── Subtle gold edge glow at iris perimeter ──
      if(p > 0.08){
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        var edgeR = openR * 0.88;
        var grd = ctx.createRadialGradient(cx,cy,edgeR*0.82, cx,cy,edgeR*1.12);
        grd.addColorStop(0, 'rgba(0,0,0,0)');
        grd.addColorStop(0.45, 'rgba(212,175,55,0.07)');
        grd.addColorStop(0.7, 'rgba(180,140,20,0.04)');
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(0,0,W,H);
        ctx.restore();
      }

      // ── Brief lens flare burst at start of opening ──
      if(elapsed > START && elapsed < START + 520){
        var fp = (elapsed - START) / 520;
        var fa = (1 - fp) * (1 - fp) * 0.72;
        if(fa > 0.004){
          ctx.save();
          ctx.globalCompositeOperation = 'screen';
          var fr = 15 + 75 * fp;
          var fgrd = ctx.createRadialGradient(cx,cy,0, cx,cy,fr);
          fgrd.addColorStop(0, 'rgba(255,245,200,'+(fa*0.95)+')');
          fgrd.addColorStop(0.25, 'rgba(212,175,55,'+(fa*0.55)+')');
          fgrd.addColorStop(0.6, 'rgba(180,130,10,'+(fa*0.18)+')');
          fgrd.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = fgrd;
          ctx.beginPath();
          ctx.arc(cx, cy, fr, 0, Math.PI*2);
          ctx.fill();

          // Anamorphic streak (horizontal light streak)
          var streakAlpha = fa * 0.35;
          var streakW = 180 + 300 * fp;
          var streakH = 2 + 4 * (1-fp);
          var sgrd = ctx.createLinearGradient(cx-streakW/2,cy, cx+streakW/2,cy);
          sgrd.addColorStop(0,'rgba(255,240,180,0)');
          sgrd.addColorStop(0.35,'rgba(255,240,180,'+streakAlpha+')');
          sgrd.addColorStop(0.5,'rgba(255,255,220,'+(streakAlpha*1.3)+')');
          sgrd.addColorStop(0.65,'rgba(255,240,180,'+streakAlpha+')');
          sgrd.addColorStop(1,'rgba(255,240,180,0)');
          ctx.fillStyle = sgrd;
          ctx.fillRect(cx-streakW/2, cy-streakH/2, streakW, streakH);
          ctx.restore();
        }
      }

      // ── Blade shadow detail: dark segments between blades ──
      // Gives the aperture a sense of metallic depth
      if(p > 0.05 && p < 0.92){
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        for(var b=0; b<N; b++){
          var bladeAngle = (b/N)*Math.PI*2 + rot;
          var bx = cx + openR*0.7*Math.cos(bladeAngle);
          var by = cy + openR*0.7*Math.sin(bladeAngle);
          var bgrd = ctx.createRadialGradient(bx,by,0, bx,by,openR*0.2);
          bgrd.addColorStop(0,'rgba(0,0,0,'+(0.12*(1-p*0.9))+')');
          bgrd.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle = bgrd;
          ctx.fillRect(0,0,W,H);
        }
        ctx.restore();
      }
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════════════════
// AUTO LANGUAGE DETECT + COUNTDOWN
// ═══════════════════════════════════════════════════════
(function(){
  var MAP = {
    'de':'german','de-at':'german','de-ch':'german','de-de':'german','de-li':'german',
    'it':'italian','it-it':'italian','it-ch':'italian',
    'es':'spanish','es-es':'spanish','es-mx':'spanish','es-419':'spanish','es-us':'spanish',
    'pt':'portuguese','pt-br':'portuguese','pt-pt':'portuguese',
    'ro':'romanian','ro-ro':'romanian',
    'ru':'russian','ru-ru':'russian','uk':'russian','be':'russian',
    'ja':'japanese','ja-jp':'japanese',
    'zh-cn':'chinese','zh-sg':'chinese','zh-hans':'chinese','zh':'chinese',
    'zh-tw':'taiwanese','zh-hant':'taiwanese',
    'zh-hk':'hongkong','zh-mo':'hongkong',
    'th':'thai','th-th':'thai',
    'vi':'vietnamese','vi-vn':'vietnamese',
    'id':'indonesian','id-id':'indonesian',
    'ms':'malaysian','ms-my':'malaysian','ms-sg':'malaysian',
    'fil':'filipino','tl':'filipino',
    'el':'greek','el-gr':'greek',
    'cs':'czech','cs-cz':'czech',
    'sq':'albanian','sq-al':'albanian',
    'fr':'frenchfacts','fr-fr':'frenchfacts','fr-ch':'frenchfacts','fr-be':'frenchfacts','fr-ca':'frenchfacts',
    'en':'english','en-gb':'english','en-us':'english','en-au':'english','en-ca':'english','en-nz':'english'
  };
  var NAMES = {
    german:'Deutsch',italian:'Italiano',spanish:'Español',portuguese:'Português',
    romanian:'Română',russian:'Русский',japanese:'日本語',chinese:'中文',
    taiwanese:'繁體中文',hongkong:'廣東話',thai:'ภาษาไทย',vietnamese:'Tiếng Việt',
    indonesian:'Bahasa Indonesia',malaysian:'Bahasa Melayu',filipino:'Filipino',
    greek:'Ελληνικά',czech:'Čeština',albanian:'Shqip',
    frenchfacts:'Français',english:'English'
  };

  var cancelled = false;
  var COUNTDOWN = 3200; // ms
  var TICK = 60;
  var msg = document.getElementById('autoMsg');
  var fill = document.getElementById('progFill');

  // Save manual choice + cancel auto-redirect
  document.querySelectorAll('.lb').forEach(function(a){
    a.addEventListener('click', function(){
      cancelled = true;
      var slug = a.getAttribute('href').replace('/','');
      try{ localStorage.setItem('ic_lang', slug==='english'?'':slug); }catch(e){}
    });
  });

  function highlightLang(slug){
    document.querySelectorAll('.lb').forEach(function(a){
      if(a.getAttribute('href')==='/'+slug) a.classList.add('hi');
    });
  }

  function runCountdown(slug){
    var dest = '/'+slug;
    var name = NAMES[slug]||slug;
    highlightLang(slug);
    var elapsed = 0;
    msg.innerHTML = 'Detected: <b>'+name+'</b> &mdash; continuing in <b id="sn">3</b>s';
    function tick(){
      if(cancelled) return;
      elapsed += TICK;
      fill.style.width = Math.min(100,(elapsed/COUNTDOWN)*100)+'%';
      var sn = document.getElementById('sn');
      if(sn) sn.textContent = Math.max(0, Math.ceil((COUNTDOWN-elapsed)/1000));
      if(elapsed >= COUNTDOWN){
        try{ localStorage.setItem('ic_lang', slug==='english'?'':slug); }catch(e){}
        window.location.replace(dest);
      } else {
        setTimeout(tick, TICK);
      }
    }
    setTimeout(tick, TICK);
  }

  // Wait for the bar animation delay + a bit
  setTimeout(function(){
    if(cancelled) return;
    try{
      var pref = localStorage.getItem('ic_lang');
      var slug = pref||'';
      if(!slug){
        var langs = navigator.languages || [navigator.language||navigator.userLanguage||''];
        for(var i=0;i<langs.length;i++){
          var l = langs[i].toLowerCase();
          if(MAP[l]){slug=MAP[l];break;}
          var s = l.split('-')[0];
          if(MAP[s]){slug=MAP[s];break;}
        }
      }
      if(slug){
        runCountdown(slug);
      } else {
        msg.innerHTML = 'Select your preferred language below';
        fill.style.display = 'none';
      }
    }catch(e){
      msg.innerHTML = 'Select your preferred language below';
    }
  }, 3600);
})();
</script>
</body>
</html>
