<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>iCONSTANTINE</title>
<meta name="description" content="Championship Media Packages — Cinema-grade video and photography for massage championships worldwide.">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#d4af37;--gold-dim:#b8960c;--gold-glow:rgba(212,175,55,.5)}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Helvetica Neue',Arial,sans-serif;color:#fff}

/* ── CANVAS PARTICLES ── */
#cvs{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.7}

/* ── RADIAL BG GLOW ── */
.bg-glow{position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse 55% 45% at 50% 38%,rgba(180,140,10,.07) 0%,transparent 70%);
  animation:bgBreath 5s ease-in-out infinite}
@keyframes bgBreath{0%,100%{opacity:.6}50%{opacity:1}}

/* ── MAIN LAYOUT ── */
.stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;padding:40px 20px 60px;gap:0}

/* ── EYE LOGO ── */
.eye-outer{position:relative;width:160px;height:160px;display:flex;align-items:center;
  justify-content:center;margin-bottom:8px;
  opacity:0;animation:eyeDrop 1.6s cubic-bezier(.16,1,.3,1) .1s forwards}

@keyframes eyeDrop{
  0%{opacity:0;transform:scale(.3);filter:brightness(8) blur(18px) saturate(3)}
  40%{opacity:1;filter:brightness(2.2) blur(4px) saturate(2)}
  70%{transform:scale(1.06);filter:brightness(1.3) blur(0)}
  85%{transform:scale(.97)}
  100%{opacity:1;transform:scale(1);filter:brightness(1) blur(0)}}

/* spinning conic ring */
.eye-outer::before{content:'';position:absolute;inset:-22px;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0%,rgba(212,175,55,.5) 20%,rgba(255,220,80,.6) 35%,transparent 55%,rgba(212,175,55,.3) 75%,transparent 100%);
  opacity:0;animation:spinRing 7s linear infinite,ringFadeIn 2.4s ease .8s forwards}
@keyframes spinRing{to{transform:rotate(360deg)}}
@keyframes ringFadeIn{to{opacity:1}}

/* pulse ring border */
.eye-outer::after{content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid rgba(212,175,55,.25);
  opacity:0;animation:ringPulse 3.5s ease-in-out infinite,ringFadeIn 2s ease 1.2s forwards}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.25}50%{transform:scale(1.1);opacity:.65}}

/* second glow ring */
.eye-ring2{position:absolute;inset:-14px;border-radius:50%;
  border:1px solid rgba(212,175,55,.1);
  opacity:0;animation:ringPulse2 4s ease-in-out 0.5s infinite,ringFadeIn 2.2s ease 1s forwards}
@keyframes ringPulse2{0%,100%{transform:scale(1);opacity:.1}50%{transform:scale(1.06);opacity:.3}}

.eye-logo{width:120px;height:120px;object-fit:contain;
  filter:drop-shadow(0 0 14px rgba(212,175,55,.7)) drop-shadow(0 0 40px rgba(212,175,55,.35)) drop-shadow(0 0 80px rgba(212,175,55,.15))}

/* ── BRAND NAME ── */
.brand-name{display:flex;gap:0;overflow:hidden;margin-top:22px;
  opacity:0;animation:fadeSlideUp .7s ease 1.5s forwards}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px) scaleX(.9);letter-spacing:.08em}
  to{opacity:1;transform:translateY(0) scaleX(1)}}

.brand-name span{display:inline-block;font-size:12.5px;font-weight:500;
  letter-spacing:.42em;text-transform:uppercase;color:rgba(212,175,55,.92);
  opacity:0;animation:letterIn .4s ease forwards}
.brand-name span:nth-child(1){animation-delay:1.5s}
.brand-name span:nth-child(2){animation-delay:1.56s}
.brand-name span:nth-child(3){animation-delay:1.62s}
.brand-name span:nth-child(4){animation-delay:1.68s}
.brand-name span:nth-child(5){animation-delay:1.74s}
.brand-name span:nth-child(6){animation-delay:1.80s}
.brand-name span:nth-child(7){animation-delay:1.86s}
.brand-name span:nth-child(8){animation-delay:1.92s}
.brand-name span:nth-child(9){animation-delay:1.98s}
.brand-name span:nth-child(10){animation-delay:2.04s}
.brand-name span:nth-child(11){animation-delay:2.10s}
.brand-name span:nth-child(12){animation-delay:2.16s}
@keyframes letterIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── DIVIDER ── */
.divider{height:1px;width:0;margin:20px 0 16px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.45),transparent);
  animation:lineGrow .9s ease 2.3s forwards}
@keyframes lineGrow{to{width:240px}}

/* ── CHOOSE TITLE ── */
.choose-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,.32);margin-bottom:24px;
  opacity:0;animation:fadeSlideUp .6s ease 2.5s forwards}

/* ── LANGUAGE GRID ── */
.lang-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;
  max-width:600px;width:94vw;
  opacity:0;transform:translateY(18px);animation:gridUp .8s ease 2.7s forwards}
@keyframes gridUp{to{opacity:1;transform:translateY(0)}}

.lb{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 5px 8px;
  background:rgba(255,255,255,.025);border:1px solid rgba(212,175,55,.1);border-radius:9px;
  cursor:pointer;text-decoration:none;color:rgba(255,255,255,.6);
  transition:background .2s,border-color .25s,color .2s,transform .15s,box-shadow .2s;
  font-size:10px;text-align:center;line-height:1.3;user-select:none}
.lb:hover{background:rgba(212,175,55,.1);border-color:rgba(212,175,55,.38);
  color:rgba(255,255,255,.95);transform:translateY(-3px);
  box-shadow:0 6px 22px rgba(212,175,55,.15)}
.lb .f{font-size:20px;line-height:1}
.lb .n{font-size:9.5px;letter-spacing:.03em;margin-top:2px}
.lb.en{border-color:rgba(212,175,55,.22);color:rgba(212,175,55,.8)}
.lb.en:hover{border-color:rgba(212,175,55,.55)}

/* ── AUTO-DETECT BAR ── */
.auto-bar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  text-align:center;opacity:0;animation:fadeSlideUp .6s ease 3.2s forwards;
  min-width:300px}
.auto-msg{font-size:10.5px;color:rgba(255,255,255,.28);letter-spacing:.06em;margin-bottom:7px}
.auto-msg b{color:rgba(212,175,55,.6);font-weight:400}
.progress-track{width:260px;height:2px;background:rgba(255,255,255,.06);border-radius:2px;
  margin:0 auto;overflow:hidden}
.progress-fill{height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,rgba(212,175,55,.5),rgba(212,175,55,.9));
  transition:width .1s linear}

/* ── SKIP HINT ── */
.skip-hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="cvs"></canvas>
<div class="bg-glow"></div>

<main class="stage">
  <div class="eye-outer">
    <div class="eye-ring2"></div>
    <img class="eye-logo" src="logo%20golden%20iconstantine%20eye%20small.png" alt="iCONSTANTINE" draggable="false">
  </div>

  <div class="brand-name" aria-label="iCONSTANTINE">
    <span>i</span><span>C</span><span>O</span><span>N</span><span>S</span>
    <span>T</span><span>A</span><span>N</span><span>T</span><span>I</span>
    <span>N</span><span>E</span>
  </div>

  <div class="divider"></div>
  <p class="choose-title">Choose your language</p>

  <div class="lang-grid">
    <a class="lb en" href="/english"><span class="f">&#127468;&#127463;</span><span class="n">English</span></a>
    <a class="lb" href="/german"><span class="f">&#127465;&#127466;</span><span class="n">Deutsch</span></a>
    <a class="lb" href="/italian"><span class="f">&#127470;&#127481;</span><span class="n">Italiano</span></a>
    <a class="lb" href="/spanish"><span class="f">&#127466;&#127480;</span><span class="n">Español</span></a>
    <a class="lb" href="/portuguese"><span class="f">&#127463;&#127479;</span><span class="n">Português</span></a>
    <a class="lb" href="/romanian"><span class="f">&#127479;&#127476;</span><span class="n">Română</span></a>
    <a class="lb" href="/russian"><span class="f">&#127479;&#127482;</span><span class="n">Русский</span></a>
    <a class="lb" href="/japanese"><span class="f">&#127471;&#127477;</span><span class="n">日本語</span></a>
    <a class="lb" href="/chinese"><span class="f">&#127464;&#127475;</span><span class="n">中文</span></a>
    <a class="lb" href="/taiwanese"><span class="f">&#127481;&#127484;</span><span class="n">繁體中文</span></a>
    <a class="lb" href="/hongkong"><span class="f">&#127469;&#127472;</span><span class="n">廣東話</span></a>
    <a class="lb" href="/thai"><span class="f">&#127481;&#127469;</span><span class="n">ภาษาไทย</span></a>
    <a class="lb" href="/vietnamese"><span class="f">&#127483;&#127475;</span><span class="n">Tiếng Việt</span></a>
    <a class="lb" href="/indonesian"><span class="f">&#127470;&#127465;</span><span class="n">Indonesia</span></a>
    <a class="lb" href="/malaysian"><span class="f">&#127474;&#127486;</span><span class="n">Melayu</span></a>
    <a class="lb" href="/filipino"><span class="f">&#127477;&#127469;</span><span class="n">Filipino</span></a>
    <a class="lb" href="/greek"><span class="f">&#127468;&#127479;</span><span class="n">Ελληνικά</span></a>
    <a class="lb" href="/czech"><span class="f">&#127464;&#127487;</span><span class="n">Čeština</span></a>
    <a class="lb" href="/albanian"><span class="f">&#127462;&#127473;</span><span class="n">Shqip</span></a>
    <a class="lb" href="/frenchfacts"><span class="f">&#127467;&#127479;</span><span class="n">Français</span></a>
  </div>
</main>

<div class="auto-bar" id="autoBar">
  <p class="auto-msg" id="autoMsg"></p>
  <div class="progress-track"><div class="progress-fill" id="progFill"></div></div>
</div>
<p class="skip-hint">click any language to continue</p>

<script>
// ── Particle Canvas ──────────────────────────────────────────────────────────
(function(){
  var c=document.getElementById('cvs');
  var ctx=c.getContext('2d');
  var W,H,particles=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();
  window.addEventListener('resize',resize);
  function Particle(){
    this.reset=function(){
      this.x=W*.3+Math.random()*W*.4;
      this.y=H*.7+Math.random()*H*.35;
      this.vx=(Math.random()-.5)*.35;
      this.vy=-(0.3+Math.random()*0.7);
      this.r=.8+Math.random()*1.4;
      this.life=0;
      this.maxLife=140+Math.random()*180;
      this.gold=Math.random()>.4;
    };
    this.reset();
    this.life=Math.random()*this.maxLife;
  }
  for(var i=0;i<55;i++){var p=new Particle();particles.push(p);}
  function draw(){
    ctx.clearRect(0,0,W,H);
    var now=Date.now();
    particles.forEach(function(p){
      p.life++;
      if(p.life>p.maxLife){p.reset();return;}
      var t=p.life/p.maxLife;
      var alpha=t<.15?t/.15:t>.75?(1-t)/.25:1;
      alpha*=.55;
      p.x+=p.vx+(Math.sin(now*.001+p.y*.02)*.15);
      p.y+=p.vy;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      if(p.gold){
        ctx.fillStyle='rgba(212,175,55,'+alpha.toFixed(3)+')';
      } else {
        ctx.fillStyle='rgba(255,240,180,'+( alpha*.5).toFixed(3)+')';
      }
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Auto Language Detect + Countdown ────────────────────────────────────────
(function(){
  var MAP={
    'de':'german','de-at':'german','de-ch':'german','de-de':'german','de-li':'german',
    'it':'italian','it-it':'italian','it-ch':'italian',
    'es':'spanish','es-es':'spanish','es-mx':'spanish','es-419':'spanish','es-us':'spanish',
    'pt':'portuguese','pt-br':'portuguese','pt-pt':'portuguese',
    'ro':'romanian','ro-ro':'romanian',
    'ru':'russian','ru-ru':'russian','uk':'russian','be':'russian',
    'ja':'japanese','ja-jp':'japanese',
    'zh-cn':'chinese','zh-sg':'chinese','zh-hans':'chinese','zh':'chinese',
    'zh-tw':'taiwanese','zh-hant':'taiwanese',
    'zh-hk':'hongkong','zh-mo':'hongkong',
    'th':'thai','th-th':'thai',
    'vi':'vietnamese','vi-vn':'vietnamese',
    'id':'indonesian','id-id':'indonesian',
    'ms':'malaysian','ms-my':'malaysian','ms-sg':'malaysian',
    'fil':'filipino','tl':'filipino',
    'el':'greek','el-gr':'greek',
    'cs':'czech','cs-cz':'czech',
    'sq':'albanian','sq-al':'albanian',
    'fr':'frenchfacts','fr-fr':'frenchfacts','fr-ch':'frenchfacts','fr-be':'frenchfacts','fr-ca':'frenchfacts',
    'en':'english','en-gb':'english','en-us':'english','en-au':'english','en-ca':'english'
  };
  var NAMES={
    german:'Deutsch',italian:'Italiano',spanish:'Español',portuguese:'Português',
    romanian:'Română',russian:'Русский',japanese:'日本語',chinese:'中文',
    taiwanese:'繁體中文',hongkong:'廣東話',thai:'ภาษาไทย',vietnamese:'Tiếng Việt',
    indonesian:'Bahasa Indonesia',malaysian:'Bahasa Melayu',filipino:'Filipino',
    greek:'Ελληνικά',czech:'Čeština',albanian:'Shqip',
    frenchfacts:'Français',english:'English'
  };

  var cancelled=false;
  var DELAY=3200; // ms countdown after bar appears (~3s after it becomes visible)
  var TICK=50;
  var bar=document.getElementById('autoBar');
  var msg=document.getElementById('autoMsg');
  var fill=document.getElementById('progFill');

  // Manual click saves preference
  document.querySelectorAll('.lb').forEach(function(a){
    a.addEventListener('click',function(e){
      cancelled=true;
      var href=a.getAttribute('href');
      var slug=href.replace('/','');
      try{localStorage.setItem('ic_lang',slug==='english'?'':slug);}catch(e2){}
    });
  });

  function startCountdown(slug){
    var dest='/'+slug;
    var name=NAMES[slug]||slug;
    var elapsed=0;
    msg.innerHTML='Detected: <b>'+name+'</b> &mdash; continuing in <b id="secs">3</b>s';
    function tick(){
      if(cancelled) return;
      elapsed+=TICK;
      var pct=Math.min(100,(elapsed/DELAY)*100);
      fill.style.width=pct+'%';
      var secs=Math.max(0,Math.ceil((DELAY-elapsed)/1000));
      var el=document.getElementById('secs');
      if(el) el.textContent=secs;
      if(elapsed>=DELAY){
        try{localStorage.setItem('ic_lang',slug==='english'?'':slug);}catch(e){}
        window.location.replace(dest);
      } else {
        setTimeout(tick,TICK);
      }
    }
    setTimeout(tick,TICK);
  }

  // Wait for bar animation to finish before starting countdown
  setTimeout(function(){
    if(cancelled) return;
    try{
      var pref=localStorage.getItem('ic_lang');
      var slug=pref||'';
      if(!slug){
        var langs=navigator.languages||[navigator.language||''];
        for(var i=0;i<langs.length;i++){
          var l=langs[i].toLowerCase();
          if(MAP[l]){slug=MAP[l];break;}
          var s=l.split('-')[0];
          if(MAP[s]){slug=MAP[s];break;}
        }
      }
      if(slug&&slug!==''){
        // Highlight the matching button
        document.querySelectorAll('.lb').forEach(function(a){
          if(a.getAttribute('href')==='/'+slug){
            a.style.borderColor='rgba(212,175,55,.5)';
            a.style.background='rgba(212,175,55,.12)';
            a.style.color='rgba(255,255,255,.95)';
          }
        });
        startCountdown(slug);
      } else {
        // No match, just show a neutral prompt
        msg.innerHTML='Select your preferred language below';
        fill.style.display='none';
      }
    } catch(e){
      msg.innerHTML='Select your preferred language below';
    }
  }, 3400); // starts counting after bar fades in
})();
</script>
</body>
</html>
